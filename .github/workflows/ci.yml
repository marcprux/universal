name: universal ci
on:
  push:
    branches: [ main ]
  workflow_dispatch:
  pull_request:
    branches:
      - '*'
  schedule:
    - cron: '0 4,16 * * *'
jobs:
  linux-android:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: skiptools/actions/setup-skip@main
        with:
          install-swift-android-sdk: true
          #swift-android-sdk-version: nightly-6.3
      - run: skip android build
      - name: "Test Swift Package on Linux"
        run: swift test
      - name: "Test Swift Package on Android"
        uses: skiptools/swift-android-action@v2
        with:
          swift-version: nightly-main
          free-disk-space: true

  macos-ios:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v6
      - name: "Test Swift Package on macOS"
        run: swift test
      - name: "Test Swift Package on iOS"
        run: xcodebuild test -sdk "iphonesimulator" -destination "platform=iOS Simulator,name=iPhone 16" -scheme "universal-Package"

  windows:
    runs-on: windows-latest
    steps:
      - uses: compnerd/gha-setup-swift@main
        with:
          swift-version: swift-6.2-release
          swift-build: 6.2-RELEASE
      - uses: actions/checkout@v6
      - run: swift test

